<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Contratos 71º BI Mtz</title>
  <style>
    body {
      background-color: #0b1d0c;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .container {
      background-color: #09170a;
      border: 1px solid rgba(237, 178, 0, 0.2);
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }
    img {
      width: 100px;
      height: 100px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 0 8px 0;
    }
    p {
      color: #a0c5a2;
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 24px 0;
    }
    .btn {
      background-color: #edb200;
      color: #070f08;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #cd8900;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="Logo 71º BI Mtz">
    <h1>Sem Conexão</h1>
    <p>Você está offline. Verifique a sua conexão de internet para acessar o portal de fiscalização de contratos.</p>
    <button class="btn" onclick="window.location.reload()">Tentar Novamente</button>
  </div>
</body>
</html>
